spring.application.name=github-repo-explorer

# ============================================================
# GitHub Repo Explorer - Production Configuration
# ============================================================

# Render Dynamic Port Support
server.port=${PORT:8080}

# ============================================================
# GitHub API Configuration
# ============================================================

github.api.base-url=https://api.github.com

# Local:
# github.api.token=

# Render Environment Variable:
github.api.token=${GITHUB_API_TOKEN:}

# ============================================================
# Cache Configuration
# ============================================================

cache.ttl-seconds=60
cache.max-size=500

# ============================================================
# CORS Configuration
# ============================================================

cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200,https://github-repo-explorer-frontend-gamma.vercel.app,https://github-repo-explorer-frontend-70arvq5qw.vercel.app,https://github-repo-explorer-sepia.vercel.app,https://github-repo-ui-sepia.vercel.app

# ============================================================
# Pagination Defaults
# ============================================================

github.repos.default-page-size=10
github.repos.max-page-size=100

# ============================================================
# Actuator Configuration
# ============================================================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=GitHub Repo Explorer API
info.app.version=1.0.0
info.app.description=Enterprise GitHub Explorer Proxy Backend

# ============================================================
# Logging Configuration
# ============================================================

logging.level.com.prashant.githubexplorer=INFO
logging.level.org.springframework.cache=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Swagger / OpenAPI
# ============================================================

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ============================================================
# JVM Optimization
# ============================================================

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s