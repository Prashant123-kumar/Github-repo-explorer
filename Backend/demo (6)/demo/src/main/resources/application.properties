spring.application.name=demo

# ============================================================
#  GitHub Explorer - Application Configuration
# ============================================================

server.port=8080

# ?? GitHub API ???????????????????????????????????????????????
# Set your GitHub Personal Access Token here to increase
# rate limit from 60 req/hr (unauthenticated) to 5000 req/hr
github.api.base-url=https://api.github.com
github.api.token=

# ?? Cache Configuration ??????????????????????????????????????
cache.ttl-seconds=60
cache.max-size=500

# ?? CORS ?????????????????????????????????????????????????????
# Comma-separated list of allowed origins
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200,https://github-repo-explorer-frontend-gamma.vercel.app,https://github-repo-explorer-frontend-70arvq5qw.vercel.app

# ?? Pagination Defaults ??????????????????????????????????????
github.repos.default-page-size=10
github.repos.max-page-size=100

# ?? Actuator ?????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics,cacheevict
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=GitHub Explorer API
info.app.version=1.0.0
info.app.description=Proxy backend for GitHub Repo Explorer

# ?? Logging ??????????????????????????????????????????????????
logging.level.com.prashant.githubexplorer=DEBUG
logging.level.org.springframework.cache=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ?? SpringDoc / Swagger ??????????????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
